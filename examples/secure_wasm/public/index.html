<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FH secure WASM transport</title>
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main>
      <h1>FH secure WASM transport</h1>
      <p>Log in, establish a device-bound session, then send an authenticated encrypted request.</p>
      <form id="login">
        <label>Username <input name="username" value="demo" autocomplete="username" required></label>
        <label>Password <input name="password" value="demo" type="password" autocomplete="current-password" required></label>
        <button type="submit">Log in and initialize</button>
      </form>
      <form id="transfer" hidden>
        <label>Recipient <input name="to" value="merchant-42" required></label>
        <label>Amount <input name="amount" value="25" type="number" min="1" max="10000" required></label>
        <button type="submit">Send secure request</button>
      </form>
      <pre id="output" aria-live="polite">Ready.</pre>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
