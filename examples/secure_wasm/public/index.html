<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FH Secure WASM Session Auth</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main>
    <section class="panel auth-panel">
      <div>
        <h1>FH Secure WASM Session Auth</h1>
        <p id="session-state">Checking session...</p>
      </div>
      <form id="login-form" autocomplete="off">
        <label>
          <span>Username</span>
          <input name="username" value="demo" required>
        </label>
        <label>
          <span>Password</span>
          <input name="password" type="password" value="demo" required>
        </label>
        <button type="submit">Log in</button>
      </form>
      <button id="logout" type="button" hidden>Log out</button>
    </section>

    <section class="panel secure-panel" id="secure-panel" hidden>
      <div class="actions">
        <button id="profile" type="button">Load protected profile</button>
        <button id="echo" type="button">Send protected echo</button>
        <button id="revoke" type="button">Revoke secure session</button>
      </div>
      <pre id="output" aria-live="polite">Log in to initialize secure fetch.</pre>
    </section>
  </main>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
