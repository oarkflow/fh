@extends("layouts/main.html")
@define("content") {
    <div style="display:grid;gap:1rem;">
        <div class="card">
            <h3>Dashboard</h3>
            <p style="font-size:0.8rem;color:#64748b;">Welcome, <strong>${user}</strong>! You are logged in.</p>
            <div style="display:flex;gap:0.5rem;margin-top:0.75rem;">
                <form action="/api/logout" method="POST">
                    <button type="submit" style="padding:0.45rem 1rem;border:none;border-radius:0.375rem;background:#ef4444;color:white;font-weight:600;cursor:pointer;">Sign Out</button>
                </form>
                <a href="/" style="padding:0.45rem 1rem;border-radius:0.375rem;border:1px solid #d1d5db;text-decoration:none;color:#475569;font-size:0.85rem;">Home</a>
            </div>
        </div>
        <div class="card">
            <h3>Session Info</h3>
            <table>
                <tr><td>User</td><td>${user}</td></tr>
                <tr><td>Role</td><td>${role}</td></tr>
                <tr><td>Logged in since</td><td>${loginTime}</td></tr>
                <tr><td>Session ID</td><td style="font-family:monospace;font-size:0.7rem;">${sessionID}</td></tr>
            </table>
        </div>
    </div>
}
