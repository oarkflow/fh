@extends("layouts/main.html")
@define("content") {
    <div style="max-width:24rem;margin:2rem auto;">
        <div class="card">
            <h3>Sign In</h3>
            <p style="font-size:0.8rem;color:#64748b;margin-bottom:1rem;">Demo: use <strong>admin</strong> / <strong>password</strong></p>
            <form action="/api/login" method="POST" style="display:grid;gap:0.75rem;">
                <div>
                    <label style="display:block;font-size:0.8rem;font-weight:600;margin-bottom:0.25rem;">Username</label>
                    <input type="text" name="username" required style="width:100%;padding:0.5rem 0.75rem;border:1px solid #d1d5db;border-radius:0.375rem;font-size:0.9rem;" />
                </div>
                <div>
                    <label style="display:block;font-size:0.8rem;font-weight:600;margin-bottom:0.25rem;">Password</label>
                    <input type="password" name="password" required style="width:100%;padding:0.5rem 0.75rem;border:1px solid #d1d5db;border-radius:0.375rem;font-size:0.9rem;" />
                </div>
                <button type="submit" style="padding:0.6rem;border:none;border-radius:0.375rem;background:#2563eb;color:white;font-weight:600;cursor:pointer;">Sign In</button>
            </form>
            @if(error != "") {
                <p style="margin-top:0.75rem;padding:0.5rem;background:#fee2e2;color:#991b1b;border-radius:0.375rem;font-size:0.8rem;">${error}</p>
            }
        </div>
    </div>
}
